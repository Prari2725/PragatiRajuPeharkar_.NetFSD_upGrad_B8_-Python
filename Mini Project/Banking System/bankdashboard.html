<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
    }

    .balance-card {
      background: linear-gradient(135deg, #0d6efd, #0a58ca);
      color: white;
      border-radius: 15px;
    }

    .transaction-card {
      border-radius: 12px;
    }

    .mobile-btn {
      width: 100%;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">🏦 MyBank</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" title="Toggle navigation menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <button class="btn btn-light btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container py-3">

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <h6 class="text-muted">Profile</h6>
      <p id="profileInfo" class="mb-0"></p>
    </div>
  </div>

  <div class="card balance-card shadow mb-3 p-3">
    <h6>Available Balance</h6>
    <h2 id="balance"></h2>
  </div>

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <h6 class="mb-3">Deposit / Withdraw</h6>

      <input type="number" id="amount" class="form-control mb-3" placeholder="Enter Amount">

      <div class="row">
        <div class="col-12 col-md-6">
          <button class="btn btn-success mobile-btn" onclick="deposit()">Deposit</button>
        </div>
        <div class="col-12 col-md-6">
          <button class="btn btn-warning mobile-btn" onclick="withdraw()">Withdraw</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <h6>Filter by Date</h6>
      <label for="filterDate" class="form-label">Select Date</label>
      <input type="date" id="filterDate" class="form-control mb-2" title="Select a date to filter transactions">
      <button class="btn btn-info mobile-btn" onclick="filterTransactions()">Filter</button>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <h6 class="mb-3">Transaction History</h6>
      <div id="transactionList"></div>
    </div>
  </div>

</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
