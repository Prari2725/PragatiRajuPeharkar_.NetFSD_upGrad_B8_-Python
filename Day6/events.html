<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>documet</title>
    <style>
        div{
            margin-top:80px;
            width:300px;
            background-color:rgb(153, 181, 181);
        }
    </style>
  </head>
  <body>
    <center>
    <h2>Events</h2>
<div>
    <button id="b1">click</button>
    <br /><br />

    <button id="b2">mouseover</button>
    <br /><br />

    <button id="b3">mouseout</button>
    <br /><br />

    <button id="b4">keydown</button>
    <br /><br />
    <input type="text" id="b5">keyup
    <br /><br />
    </div>
    </center>

    <script>
      let b1 = document.getElementById("b1");
      let b2 = document.getElementById("b2");
      let b3 = document.getElementById("b3");
      let b4 = document.getElementById("b4");
      let b5 = document.getElementById("b5");



      b1.addEventListener("click", function () {
        alert("you  have click the button");
      });

      b2.addEventListener("mouseover", function () {
        alert("mouseover on the button");
      });

      b3.addEventListener("mouseout", function () {
        alert("mouseout from the button");
      });

      b4.addEventListener("keydown", function () {
        alert("keydown on the button");
      });

      b5.addEventListener("keyup", function () {
        alert("keyup on the button");
      });



    </script>
  </body>
</html>
