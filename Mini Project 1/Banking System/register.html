<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width:350px;">
  <h3 class="text-center mb-3">📝 Register</h3>

  <input type="text" id="regName" class="form-control mb-2" placeholder="Username">
  <input type="password" id="regPassword" class="form-control mb-2" placeholder="Password">
  <input type="number" id="regBalance" class="form-control mb-3" placeholder="Initial Balance">

  <button class="btn btn-success w-100 mb-2" onclick="register()">Register</button>

  <p class="text-center mb-0">
    Already have an account?
    <a href="login.html">Login</a>
  </p>
</div>

<script src="logic.js"></script>
</body>
</html>
